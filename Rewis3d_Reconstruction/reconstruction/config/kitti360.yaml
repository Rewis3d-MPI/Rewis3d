dataset:
  dataset_dir: "/BS/segmentation-2D3D-dataset/KITTI360/"
  output_dir: "/scratch/inf0/user/jernst/Datasets/KITTI360MapAnything100Chunk10Conf70ratio"
  splits: ["training","validation"]
  num_cameras: 1
  file_extension: "png"

sampling:
  strategy: "chunk"
  num_images: 100

reconstruction:
  method: "map_anything"
  confidence_percentile: 10

point_sampling:
  method: "random_radius"
  num_points: 120000
  image_ratio: 1.0

preprocessing:
  image_scale_factor: 1.0   # Scale factor for resizing images (e.g., 0.5 for half size, 1.0 for no resizing)

labels:
  ignore_index: 255
  class_definitions:
    - ["unlabeled", 0, 255, [0, 0, 0]]
    - ["ego vehicle", 1, 255, [0, 0, 0]]
    - ["rectification border", 2, 255, [0, 0, 0]]
