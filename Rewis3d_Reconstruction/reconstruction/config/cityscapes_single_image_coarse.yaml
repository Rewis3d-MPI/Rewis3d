dataset:
  dataset_dir: "/BS/segmentation-2D3D-dataset-indoor/cityscapes_converted/"
  output_dir: "/scratch/inf0/user/jernst/Datasets/CityscapesSingleImageCoarse/"
  splits: ["training","validation"]
  num_cameras: 1
  file_extension: "png"

sampling:
  strategy: "chunk"
  num_images: 1

reconstruction:
  method: "map_anything"
  confidence_percentile: 10

point_sampling:
  method: "random_uniform"
  num_points: 120000

preprocessing:
  image_scale_factor: 0.5   # Scale factor for resizing images (e.g., 0.5 for half size, 1.0 for no resizing)

# Mask file naming configuration and per-split overrides
masks:
  # 2D masks (for the NPZ data_2d section)
  student_mask_2d: "coarse_{cam_id}.png"   # Used for student_mask_1 in 2D
  original_mask_2d: "mask_{cam_id}.png"      # Used for original_mask_1 in 2D
  # 3D segments (for the NPZ data_3d section) — not used here but kept for consistency
  student_segment_3d: "coarse_{cam_id}.png"
  original_segment_3d: "mask_{cam_id}.png"

labels:
  ignore_index: 255
  class_definitions:
    - ["unlabeled", 0, 255, [0, 0, 0]]
    - ["ego vehicle", 1, 255, [0, 0, 0]]
    - ["rectification border", 2, 255, [0, 0, 0]]
    - ["out of roi", 3, 255, [0, 0, 0]]
    - ["static", 4, 255, [0, 0, 0]]
    - ["dynamic", 5, 255, [111, 74, 0]]
    - ["ground", 6, 255, [81, 0, 81]]
    - ["road", 7, 0, [128, 64, 128]]
    - ["sidewalk", 8, 1, [244, 35, 232]]
    - ["parking", 9, 255, [250, 170, 160]]
    - ["rail track", 10, 255, [230, 150, 140]]
    - ["building", 11, 2, [70, 70, 70]]
    - ["wall", 12, 3, [102, 102, 156]]
    - ["fence", 13, 4, [190, 153, 153]]
    - ["guard rail", 14, 255, [180, 165, 180]]
    - ["bridge", 15, 255, [150, 100, 100]]
    - ["tunnel", 16, 255, [150, 120, 90]]
    - ["pole", 17, 5, [153, 153, 153]]
    - ["polegroup", 18, 255, [153, 153, 153]]
    - ["traffic light", 19, 6, [250, 170, 30]]
    - ["traffic sign", 20, 7, [220, 220, 0]]
    - ["vegetation", 21, 8, [107, 142, 35]]
    - ["terrain", 22, 9, [152, 251, 152]]
    - ["sky", 23, 10, [70, 130, 180]]
    - ["person", 24, 11, [220, 20, 60]]
    - ["rider", 25, 12, [255, 0, 0]]
    - ["car", 26, 13, [0, 0, 142]]
    - ["truck", 27, 14, [0, 0, 70]]
    - ["bus", 28, 15, [0, 60, 100]]
