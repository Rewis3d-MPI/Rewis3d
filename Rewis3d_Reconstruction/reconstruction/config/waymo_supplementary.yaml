dataset:
  dataset_dir: "segmentation-2D3D-dataset/WaymoSupplementary/"
  output_dir: "Datasets/WaymoSupplementary/"
  splits: ["training"]
  num_cameras: 3            # Total number of camera streams available per frame
  cameras_to_use: [1]          # If num_cameras == 1, specify which camera index to use (1-based)
  file_extension: "jpg"

sampling:
  strategy: "chunk"         # One of: chunk, random, uniform
  num_images: 180           # For chunk: max chunk size target; for random/uniform: number of images
  n_interval: 1             # Keep every n-th frame group (applied per frame across cameras)
  keep_all_labeled: true    # If true, frames with labels are kept even if skipped by interval
  min_masks_per_chunk: 1
  
reconstruction:
  method: "map_anything"
  confidence_percentile: 10

point_sampling:
  method: "random_uniform"
  num_points: 12000000000

preprocessing:
  image_scale_factor: 0.5   # Scale factor for resizing images (e.g., 0.5 for half size, 1.0 for no resizing)

# Mask file naming configuration (default Waymo setup)
masks:
  # 2D masks saved in NPZ data_2d
  student_mask_2d: "scribble_{cam_id}.png"       # For student_mask_1 in 2D
  original_mask_2d: "mask_{cam_id}.png"          # For original_mask_1 in 2D
  
  # 3D segments saved in NPZ data_3d  
  student_segment_3d: "scribble_{cam_id}.png"    # For student_segment in 3D
  original_segment_3d: "mask_{cam_id}.png"       # For original_segment in 3D

labels:
  ignore_index: 255
  class_definitions:
    - ["undefined", 0, 255, [0, 0, 0]]
    - ["ego vehicle", 1, 255, [0, 0, 0]]
    - ["car", 2, 0, [0, 0, 142]]
    - ["truck", 3, 1, [0, 0, 70]]
